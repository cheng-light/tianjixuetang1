server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tianji_academy?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: 填写你本地MySQL账号
    password: 填写你本地MySQL密码
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: 自定义本地JWT密钥，请勿使用默认值
    expiration-minutes: 720
  upload-dir: uploads